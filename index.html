<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Pierwsza Strona</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #24292e;
        }
        p {
            color: #555;
            font-size: 18px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Witaj na mojej stronie! 🚀</h1>
        <p>Jeśli widzisz ten tekst, oznacza to, że <span class="success">GitHub Pages działa poprawnie</span>.</p>
        <p>Powodzenia w dalszej nauce!</p>
    </div>

</body>
</html>

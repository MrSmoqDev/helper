<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrum Pomocy - Wybierz Język</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #dfe6e9;
            --text: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 { margin-bottom: 10px; color: var(--text); }
        p { color: #636e72; margin-bottom: 30px; }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card i {
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .card h3 { font-size: 18px; }
        
        /* Ikony FontAwesome */
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css');
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 Centrum Pomocy</h1>
        <p>Wybierz technologię, której chcesz się nauczyć:</p>

        <div class="options">
            <!-- Karta Python -->
            <a href="python/general.html" class="card">
                <i class="fab fa-python"></i>
                <h3>Python</h3>
                <span style="font-size: 12px; color: #888; margin-top: 5px;">Podstawy i Importy</span>
            </a>

            <!-- Miejsce na przyszłe języki -->
            <div class="card" style="opacity: 0.5; cursor: not-allowed;">
                <i class="fab fa-js"></i>
                <h3>C++</h3>
                <span style="font-size: 12px; color: #888; margin-top: 5px;">Wkrótce...</span>
            </div>
        </div>
    </div>

</body>
</html>

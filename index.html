<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Portfolio</title>
    <!-- Import czcionki Google -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Ikony (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- RESET I BAZA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }

        /* --- GŁÓWNA KARTA (GLASSMORPHISM) --- */
        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
            animation: fadeIn 1s ease-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* --- ZDJĘCIE PROFILU --- */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* --- TEKSTY --- */
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2d3748;
        }

        p {
            font-size: 14px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .badge {
            display: inline-block;
            background: #edf2f7;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 20px;
        }

        /* --- PRZYCISKI --- */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn i {
            margin-right: 10px;
            font-size: 18px;
        }

        /* --- STOPKA --- */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
        }

        /* --- ANIMACJA WEJŚCIA --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPENSYWNOŚĆ --- */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- ZMIEŃ TO: Link do Twojego zdjęcia (może być z internetu lub plik lokalny) -->
        <img src="https://ui-avatars.com/api/?name=Jan+Kowalski&background=667eea&color=fff&size=200" alt="Zdjęcie Profilowe" class="avatar">
        
        <!-- ZMIEŃ TO: Twoje Imię i Nazwisko -->
        <h1>Jan Kowalski</h1>
        
        <!-- ZMIEŃ TO: Krótki opis -->
        <span class="badge">Web Developer</span>
        <p>
            Cześć! Tworzę nowoczesne strony internetowe i aplikacje. 
            Pasjonat technologii i designu. Zapraszam do kontaktu!
        </p>

        <div class="buttons">
            <!-- ZMIEŃ TO: Link do Twojego projektu lub kontaktu -->
            <a href="mailto:twoj@email.com" class="btn btn-primary">
                <i class="fas fa-envelope"></i> Napisz do mnie
            </a>
            
            <!-- ZMIEŃ TO: Link do GitHub / LinkedIn -->
            <a href="https://github.com" target="_blank" class="btn btn-secondary">
                <i class="fab fa-github"></i> Moje GitHub
            </a>
        </div>

        <div class="footer">
            &copy; 2023 Hostowane na GitHub Pages
        </div>
    </div>

    <script>
        // Prosty skrypt dodający powitanie w konsoli
        console.log("Strona załadowana pomyślnie! 🚀");
        
        // Opcjonalnie: Dynamyczna zmiana powitania w zależności od godziny
        const hour = new Date().getHours();
        const greeting = hour < 12 ? "Dzień dobry!" : (hour < 18 ? "Dzień dobry!" : "Dobry wieczór!");
        console.log(greeting);
    </script>
</body>
</html>
